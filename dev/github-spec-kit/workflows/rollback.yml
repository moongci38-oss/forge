name: Rollback

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Rollback reason (brief description)'
        required: true
        type: string
      level:
        description: 'Rollback level'
        required: true
        type: choice
        options:
          - L1-quick-revert
          - L2-release-revert
          - L3-hotfix-forward
      target_version:
        description: 'Target version for L2 (e.g. 1.1.0) — leave blank for L1/L3'
        required: false
        type: string

concurrency:
  group: rollback
  cancel-in-progress: false

jobs:
  rollback-l1:
    name: L1 Quick Revert
    runs-on: ubuntu-latest
    if: github.event.inputs.level == 'L1-quick-revert'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Revert last commit on main
        run: |
          COMMIT=$(git rev-parse HEAD)
          git revert --no-edit "$COMMIT"
          git push origin main
          echo "## L1 Quick Revert Complete" >> $GITHUB_STEP_SUMMARY
          echo "Reverted commit: $COMMIT" >> $GITHUB_STEP_SUMMARY
          echo "Reason: ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY

  rollback-l2:
    name: L2 Release Revert
    runs-on: ubuntu-latest
    if: github.event.inputs.level == 'L2-release-revert'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate target version
        run: |
          VERSION="${{ github.event.inputs.target_version }}"
          if [ -z "$VERSION" ]; then
            echo "::error::target_version is required for L2 rollback"
            exit 1
          fi
          TAG="v${VERSION}"
          if ! git tag | grep -q "^${TAG}$"; then
            echo "::error::Tag $TAG not found. Available tags:"
            git tag | sort -V | tail -20
            exit 1
          fi
          echo "Target tag $TAG found"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Revert main to target version
        run: |
          TARGET_VERSION="${{ github.event.inputs.target_version }}"
          TAG="v${TARGET_VERSION}"
          TARGET_SHA=$(git rev-parse "$TAG")
          CURRENT_SHA=$(git rev-parse HEAD)

          # Create a revert commit back to the target tag
          git revert --no-commit "$TARGET_SHA...$CURRENT_SHA"
          git commit -m "revert: rollback to $TAG (L2 rollback — ${{ github.event.inputs.reason }})"
          git push origin main

          echo "## L2 Release Revert Complete" >> $GITHUB_STEP_SUMMARY
          echo "Reverted to: $TAG ($TARGET_SHA)" >> $GITHUB_STEP_SUMMARY
          echo "Reason: ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY

      - name: Re-deploy previous version (if deployCommand configured)
        run: |
          if [ ! -f "release-config.json" ]; then
            echo "::notice::No release-config.json — skipping re-deploy"
            exit 0
          fi
          DEPLOY_CMD=$(node -e "
            try {
              const c = require('./release-config.json');
              process.stdout.write(c.environments?.production?.deployCommand || '');
            } catch(e) {
              process.stdout.write('');
            }
          " 2>/dev/null || echo "")
          if [ -n "$DEPLOY_CMD" ]; then
            echo "Re-deploying previous version..."
            eval "$DEPLOY_CMD"
          else
            echo "::notice::deployCommand empty — code reverted but no re-deploy triggered"
          fi
        env:
          DEPLOY_ENV: production

  rollback-l3:
    name: L3 Hotfix Forward
    runs-on: ubuntu-latest
    if: github.event.inputs.level == 'L3-hotfix-forward'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create hotfix branch
        run: |
          VERSION=$(node -e "
            try {
              const p = require('./package.json');
              process.stdout.write(p.version || '0.0.0');
            } catch(e) {
              process.stdout.write('0.0.0');
            }
          " 2>/dev/null || echo "0.0.0")
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          BRANCH="hotfix/rollback-${TIMESTAMP}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          echo "## L3 Hotfix Forward — Branch Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Hotfix branch**: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "**Reason**: ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Checkout \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Apply fix" >> $GITHUB_STEP_SUMMARY
          echo "3. Run Trine Hotfix 플로우 (Phase 3 → Check 3 → Phase 4 PR → Phase 7)" >> $GITHUB_STEP_SUMMARY

  rollback-summary:
    name: Rollback Summary
    runs-on: ubuntu-latest
    needs: [rollback-l1, rollback-l2, rollback-l3]
    if: always()
    steps:
      - name: Post summary
        run: |
          LEVEL="${{ github.event.inputs.level }}"
          REASON="${{ github.event.inputs.reason }}"
          L1="${{ needs.rollback-l1.result }}"
          L2="${{ needs.rollback-l2.result }}"
          L3="${{ needs.rollback-l3.result }}"

          echo "## Trine Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Level | $LEVEL |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | $REASON |" >> $GITHUB_STEP_SUMMARY
          echo "| L1 | $L1 |" >> $GITHUB_STEP_SUMMARY
          echo "| L2 | $L2 |" >> $GITHUB_STEP_SUMMARY
          echo "| L3 | $L3 |" >> $GITHUB_STEP_SUMMARY
