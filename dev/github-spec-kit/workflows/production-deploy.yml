name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deploy (build artifacts only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      deployed: ${{ steps.deploy.outputs.deployed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "
            try {
              const p = require('./package.json');
              process.stdout.write(p.version || '0.0.0');
            } catch(e) {
              process.stdout.write('0.0.0');
            }
          " 2>/dev/null || echo "0.0.0")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Read release-config.json
        id: config
        run: |
          if [ -f "release-config.json" ]; then
            DEPLOY_CMD=$(node -e "
              try {
                const c = require('./release-config.json');
                process.stdout.write(c.environments?.production?.deployCommand || '');
              } catch(e) {
                process.stdout.write('');
              }
            " 2>/dev/null || echo "")
            echo "deploy_cmd=$DEPLOY_CMD" >> $GITHUB_OUTPUT
          else
            echo "deploy_cmd=" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production
        id: deploy
        if: ${{ github.event.inputs.skip_deploy != 'true' }}
        run: |
          CMD="${{ steps.config.outputs.deploy_cmd }}"
          if [ -z "$CMD" ]; then
            echo "::notice::deployCommand is empty — 배포 인프라 미설정. build artifacts만 생성합니다."
            echo "deployed=skipped" >> $GITHUB_OUTPUT
          else
            echo "Executing: $CMD"
            eval "$CMD"
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi
        env:
          DEPLOY_ENV: production

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.outputs.deployed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run health check
        run: |
          if [ ! -f "release-config.json" ]; then
            echo "::notice::No release-config.json — skipping health check"
            exit 0
          fi
          HEALTH=$(node -e "
            try {
              const c = require('./release-config.json');
              process.stdout.write(c.environments?.production?.healthEndpoint || '');
            } catch(e) {
              process.stdout.write('');
            }
          " 2>/dev/null || echo "")
          if [ -z "$HEALTH" ]; then
            echo "::notice::No healthEndpoint configured — skipping health check"
            exit 0
          fi
          TIMEOUT=$(node -e "
            try {
              const c = require('./release-config.json');
              process.stdout.write(String(c.environments?.production?.healthTimeout || 120));
            } catch(e) {
              process.stdout.write('120');
            }
          " 2>/dev/null || echo "120")
          echo "Checking $HEALTH (timeout: ${TIMEOUT}s)..."
          END=$((SECONDS + TIMEOUT))
          while [ $SECONDS -lt $END ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Returned $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::error::Health check timed out"
          exit 1

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: always() && needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Check smoke test URL
        id: check
        run: |
          if [ ! -f "release-config.json" ]; then
            echo "has_smoke=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          SMOKE=$(node -e "
            try {
              const c = require('./release-config.json');
              process.stdout.write(c.environments?.production?.smokeTestURL || '');
            } catch(e) {
              process.stdout.write('');
            }
          " 2>/dev/null || echo "")
          if [ -n "$SMOKE" ]; then
            echo "has_smoke=true" >> $GITHUB_OUTPUT
            echo "smoke_url=$SMOKE" >> $GITHUB_OUTPUT
          else
            echo "has_smoke=false" >> $GITHUB_OUTPUT
          fi

      - name: Run smoke test
        if: steps.check.outputs.has_smoke == 'true'
        run: |
          URL="${{ steps.check.outputs.smoke_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Smoke test passed: $URL → HTTP $STATUS"
          else
            echo "::error::Smoke test failed: $URL → HTTP $STATUS"
            exit 1
          fi

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy, health-check, smoke-test]
    if: always() && needs.deploy.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.deploy.outputs.version }}';
            const tag = 'v' + version;
            const sha = context.sha;

            // Create tag
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha,
              });
              console.log(`Tag ${tag} created`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists — skipping`);
              } else {
                throw e;
              }
            }

            // Read changelog if exists
            let body = `## Release ${version}\n\nDeployed via Trine Phase 7.`;
            try {
              const { data: file } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'CHANGELOG.md',
              });
              body = Buffer.from(file.content, 'base64').toString('utf8').split('\n').slice(0, 30).join('\n');
            } catch {}

            // Create release
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${version}`,
              body,
              draft: false,
              prerelease: false,
            });
            console.log('Release created:', release.html_url);

            core.summary.addRaw(`## Trine Phase 7 Complete\n\n[Release ${version}](${release.html_url})\n`);
            await core.summary.write();

  cleanup:
    name: Cleanup Release Branch
    runs-on: ubuntu-latest
    needs: [create-github-release]
    if: needs.create-github-release.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Delete release branch
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.deploy.outputs.version }}';
            const branch = 'release/' + version;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`Branch ${branch} deleted`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Branch ${branch} not found — skipping`);
              } else {
                console.warn('Could not delete branch:', e.message);
              }
            }
