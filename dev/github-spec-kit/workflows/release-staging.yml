name: Release + Staging

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      deploy_staging:
        description: 'Deploy to staging (requires deployCommand in release-config.json)'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        id: branch
        run: |
          BRANCH="release/${{ github.event.inputs.version }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        run: |
          if [ -f "package.json" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '${{ github.event.inputs.version }}';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('Version bumped to ${{ github.event.inputs.version }}');
            "
            git add package.json
            git commit -m "chore: bump version to ${{ github.event.inputs.version }}" || echo "No changes to commit"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Push release branch
        run: git push origin "release/${{ github.event.inputs.version }}"

  staging-deploy:
    name: Staging Deploy (conditional)
    runs-on: ubuntu-latest
    needs: create-release-branch
    if: ${{ github.event.inputs.deploy_staging == 'true' }}
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release-branch.outputs.branch }}

      - name: Read release-config.json
        id: config
        run: |
          if [ -f "release-config.json" ]; then
            DEPLOY_CMD=$(node -e "
              const c = require('./release-config.json');
              console.log(c.environments?.staging?.deployCommand || '');
            " 2>/dev/null || echo "")
            echo "deploy_cmd=$DEPLOY_CMD" >> $GITHUB_OUTPUT
          else
            echo "deploy_cmd=" >> $GITHUB_OUTPUT
            echo "::notice::release-config.json not found — skipping deploy"
          fi

      - name: Deploy to staging
        id: deploy
        run: |
          CMD="${{ steps.config.outputs.deploy_cmd }}"
          if [ -z "$CMD" ]; then
            echo "::notice::deployCommand is empty — 배포 인프라 미설정. build/test만 실행합니다."
            echo "deployed=skipped" >> $GITHUB_OUTPUT
          else
            echo "Executing: $CMD"
            eval "$CMD"
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi
        env:
          DEPLOY_ENV: staging

      - name: Health check (staging)
        if: steps.deploy.outputs.deployed == 'true'
        run: |
          HEALTH=$(node -e "
            const c = require('./release-config.json');
            console.log(c.environments?.staging?.healthEndpoint || '');
          " 2>/dev/null || echo "")
          if [ -n "$HEALTH" ]; then
            TIMEOUT=$(node -e "
              const c = require('./release-config.json');
              console.log(c.environments?.staging?.healthTimeout || 120);
            " 2>/dev/null || echo "120")
            echo "Waiting for $HEALTH (timeout: ${TIMEOUT}s)..."
            END=$((SECONDS + TIMEOUT))
            while [ $SECONDS -lt $END ]; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed"
                exit 0
              fi
              sleep 5
            done
            echo "::error::Health check timed out"
            exit 1
          fi

  e2e-staging:
    name: E2E (staging)
    runs-on: ubuntu-latest
    needs: [create-release-branch, staging-deploy]
    if: always() && needs.create-release-branch.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release-branch.outputs.branch }}

      - name: Check e2e-pipeline config
        id: check
        run: |
          if [ -f ".specify/e2e-pipeline.json" ]; then
            echo "has_config=true" >> $GITHUB_OUTPUT
          else
            echo "has_config=false" >> $GITHUB_OUTPUT
            echo "::notice::No e2e-pipeline.json — skipping E2E"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_config == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        if: steps.check.outputs.has_config == 'true'
        run: npm install -g pnpm

      - name: Install dependencies
        if: steps.check.outputs.has_config == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.check.outputs.has_config == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (staging)
        if: steps.check.outputs.has_config == 'true'
        run: |
          if [ -f "scripts/e2e-runner.sh" ]; then
            bash scripts/e2e-runner.sh --env staging
          else
            echo "::notice::e2e-runner.sh not found — skipping"
          fi
        env:
          CI: true

  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    needs: [create-release-branch, staging-deploy, e2e-staging]
    if: always() && needs.create-release-branch.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release-branch.outputs.branch }}

      - name: Create Release PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ github.event.inputs.version }}';
            const branch = 'release/' + version;
            const staging = '${{ needs.staging-deploy.outputs.deployed }}';
            const e2e = '${{ needs.e2e-staging.result }}';

            const body = [
              `## Release ${version}`,
              '',
              '### Pre-merge Checklist',
              '- [ ] Version bumped in package.json',
              `- [${staging === 'true' ? 'x' : staging === 'skipped' ? '-' : ' '}] Staging deploy (${staging})`,
              `- [${e2e === 'success' ? 'x' : e2e === 'skipped' ? '-' : ' '}] E2E staging (${e2e})`,
              '- [ ] CHANGELOG reviewed',
              '- [ ] QA sign-off',
              '',
              '> **Forge Phase 11** — Approve and merge to main to trigger Phase 7 production deploy.',
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `release: ${version}`,
              head: branch,
              base: 'main',
              body,
            });
            console.log('Release PR created:', pr.html_url);
            core.summary.addRaw(`## Release PR\n[${pr.html_url}](${pr.html_url})\n\n**Forge Check 9.5** — [STOP] Human 승인 필요`);
            await core.summary.write();
