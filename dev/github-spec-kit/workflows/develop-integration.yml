name: Develop Integration Check

on:
  push:
    branches:
      - develop

concurrency:
  group: develop-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-verify:
    name: Integration Verify
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.verify.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verify.sh code
        id: verify
        run: |
          if [ -f "scripts/verify.sh" ]; then
            bash scripts/verify.sh code
            echo "result=pass" >> $GITHUB_OUTPUT
          else
            echo "::warning::verify.sh not found — running fallback checks"
            pnpm run build 2>&1 || exit 1
            pnpm run lint 2>&1 || true
            pnpm run test 2>&1 || exit 1
            echo "result=pass" >> $GITHUB_OUTPUT
          fi

  e2e-check:
    name: E2E Check (conditional)
    runs-on: ubuntu-latest
    needs: integration-verify
    if: needs.integration-verify.outputs.result == 'pass'
    steps:
      - uses: actions/checkout@v4

      - name: Check e2e-pipeline config
        id: check-config
        run: |
          if [ -f ".specify/e2e-pipeline.json" ]; then
            echo "has_config=true" >> $GITHUB_OUTPUT
          else
            echo "has_config=false" >> $GITHUB_OUTPUT
            echo "::notice::No e2e-pipeline.json found — skipping E2E"
          fi

      - name: Setup Node.js
        if: steps.check-config.outputs.has_config == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        if: steps.check-config.outputs.has_config == 'true'
        run: npm install -g pnpm

      - name: Install dependencies
        if: steps.check-config.outputs.has_config == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.check-config.outputs.has_config == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E (local env)
        if: steps.check-config.outputs.has_config == 'true'
        run: |
          if [ -f "scripts/e2e-runner.sh" ]; then
            bash scripts/e2e-runner.sh --env local
          else
            echo "::warning::e2e-runner.sh not found — skipping E2E runner"
          fi
        env:
          CI: true

  integration-report:
    name: Integration Report
    runs-on: ubuntu-latest
    needs: [integration-verify, e2e-check]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Determine overall status
        id: status
        run: |
          VERIFY="${{ needs.integration-verify.result }}"
          E2E="${{ needs.e2e-check.result }}"
          if [ "$VERIFY" = "success" ] && ([ "$E2E" = "success" ] || [ "$E2E" = "skipped" ]); then
            echo "overall=success" >> $GITHUB_OUTPUT
          else
            echo "overall=failure" >> $GITHUB_OUTPUT
          fi

      - name: Post integration summary
        run: |
          STATUS="${{ steps.status.outputs.overall }}"
          COMMIT="${{ github.sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          echo "## Trine Phase 5 — Develop Integration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| verify.sh code | ${{ needs.integration-verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (local) | ${{ needs.e2e-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall: ${STATUS}** (commit: ${SHORT_SHA})" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Issue on failure
        if: steps.status.outputs.overall == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'integration-failure',
              state: 'open',
            });
            // Avoid duplicate issues for the same commit
            const commit = context.sha.substring(0, 7);
            const exists = issues.some(i => i.title.includes(commit));
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Integration Failure] develop @ ${commit}`,
                body: [
                  '## Develop Integration Check Failed',
                  '',
                  `**Branch:** develop`,
                  `**Commit:** ${context.sha}`,
                  `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  '### Failed Jobs',
                  `- verify.sh code: ${{ needs.integration-verify.result }}`,
                  `- E2E: ${{ needs.e2e-check.result }}`,
                  '',
                  '**Trine Phase 5** — Please investigate and fix before cutting a release branch.',
                ].join('\n'),
                labels: ['integration-failure', 'forge-phase-5'],
              });
            }
