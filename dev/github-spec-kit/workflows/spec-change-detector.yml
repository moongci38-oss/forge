# =============================================================================
# Spec Change Detector — Spec 변경 감지 + 추적 이슈 자동 생성
# Spec Change Detector — Detects Spec changes and auto-creates tracking issues
# =============================================================================
#
# [한글]
# 기능: main/develop 브랜치에 Spec 파일이 변경되어 push되면,
#       변경 내용을 분석하고 영향받는 소스 파일을 검색하여
#       GitHub Issue를 자동 생성한다.
# 트리거 시점: main 또는 develop 브랜치에 push될 때,
#             .specify/specs/** 경로의 파일이 변경된 경우에만 실행.
#             (일반적으로 PR merge 시 트리거됨)
#
# 실행 흐름:
#   1. 이전 커밋 대비 변경된 Spec 파일 목록 감지
#   2. 각 Spec 파일의 diff 추출 + 소스 코드에서 Spec 이름 참조 검색
#   3. "[Spec Change] {파일명}" 제목의 GitHub Issue 자동 생성
#   4. Issue에 TODO 체크리스트 포함 (코드 업데이트, 테스트, 문서 등)
#
# 사용 목적:
#   - Spec이 변경되면 관련 코드도 업데이트해야 함을 추적
#   - SDD(Spec Driven Development)에서 Spec 변경의 영향 범위를 가시화
#   - 팀원에게 Spec 변경 알림 + 후속 작업 할당 용도
#
# 배포 위치: 프로젝트의 .github/workflows/spec-change-detector.yml 에 복사하여 사용
#
# [English]
# Purpose: When Spec files are changed and pushed to main/develop,
#          analyzes changes, searches for affected source files,
#          and auto-creates a GitHub tracking Issue.
# Trigger: Fires on push to main or develop branches,
#          only when files under .specify/specs/** are modified.
#          (Typically triggered by PR merges)
#
# Execution flow:
#   1. Detect changed Spec files compared to previous commit
#   2. Extract diff for each Spec + search source code for Spec name references
#   3. Auto-create GitHub Issue titled "[Spec Change] {filename}"
#   4. Issue includes TODO checklist (update code, tests, docs, etc.)
#
# Use case:
#   - Track that related code needs updating when Specs change
#   - Visualize impact scope of Spec changes in SDD workflow
#   - Notify team members + assign follow-up work
#
# Deployment: Copy to .github/workflows/spec-change-detector.yml in your project
# =============================================================================

name: Spec Change Detector

on:
  # [한글] main/develop 브랜치에 push될 때, .specify/specs/** 파일이 변경된 경우만 트리거
  # [English] Triggered on push to main/develop, only when .specify/specs/** files change
  push:
    branches:
      - main
      - develop
    paths:
      - '.specify/specs/**'

jobs:
  detect-spec-changes:
    name: Detect Spec Changes
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_SERVER_URL: ${{ github.server_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # [한글] 이전 커밋과 비교하기 위해 depth 2 필요
          # [English] Need depth 2 to compare with previous commit
          fetch-depth: 2

      # [한글] Step 1: 변경된 Spec 파일 목록 감지
      #   HEAD~1과 HEAD 사이의 .specify/specs/ 내 .md 파일 변경 확인
      #   변경 없으면 후속 처리 스킵
      # [English] Step 1: Detect changed Spec files
      #   Checks .md file changes in .specify/specs/ between HEAD~1 and HEAD
      #   If no changes, skip subsequent processing
      - name: Detect changed spec files
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '.specify/specs/*.md' '.specify/specs/**/*.md')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No spec files changed"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed spec files:"
          echo "$CHANGED_FILES"

          CHANGED_LIST=$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//')
          echo "changed_list=${CHANGED_LIST}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      # [한글] Step 2: 영향 범위 분석
      #   각 변경된 Spec에 대해:
      #   - git diff로 변경 내용(추가/삭제된 라인) 추출
      #   - 소스 코드(TS, JS, C#, Python)에서 Spec 이름을 참조하는 파일 검색
      #   언어 무관 검색 (ts, tsx, js, jsx, cs, py 모두 포함)
      # [English] Step 2: Analyze impact scope
      #   For each changed Spec:
      #   - Extract changes (added/removed lines) via git diff
      #   - Search source files (TS, JS, C#, Python) referencing the Spec name
      #   Language-agnostic search (covers ts, tsx, js, jsx, cs, py)
      - name: Analyze impact scope
        id: impact
        if: steps.detect.outputs.has_changes == 'true'
        env:
          CHANGED_LIST: ${{ steps.detect.outputs.changed_list }}
        run: |
          IFS=',' read -ra FILES <<< "$CHANGED_LIST"
          IMPACT_REPORT=""

          for SPEC_FILE in "${FILES[@]}"; do
            SPEC_NAME=$(basename "$SPEC_FILE" .md)

            IMPACT_REPORT+="### \`$SPEC_FILE\`\n\n"

            # Spec diff / Spec 변경 내용
            DIFF=$(git diff HEAD~1 HEAD "$SPEC_FILE" | grep "^[+-]" | grep -v "^[+-]\{3\}" || true)
            if [ -n "$DIFF" ]; then
              IMPACT_REPORT+="**Changes:**\n\`\`\`diff\n$DIFF\n\`\`\`\n\n"
            fi

            # [한글] 소스 코드에서 Spec 이름 참조 검색 (언어 무관)
            # [English] Search source code for Spec name references (language-agnostic)
            IMPACT_REPORT+="**Potentially affected files:**\n"

            RELATED_FILES=$(grep -rl "$SPEC_NAME" . \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
              --include="*.cs" --include="*.py" \
              --exclude-dir=".git" --exclude-dir="node_modules" --exclude-dir=".specify" \
              --exclude-dir=".github" --exclude-dir="dist" --exclude-dir="build" \
              2>/dev/null || echo "")

            if [ -n "$RELATED_FILES" ]; then
              while IFS= read -r f; do
                IMPACT_REPORT+="- \`$f\`\n"
              done <<< "$RELATED_FILES"
            else
              IMPACT_REPORT+="- No direct references found in source code\n"
            fi

            IMPACT_REPORT+="\n---\n\n"
          done

          # Save impact report for next step
          echo -e "$IMPACT_REPORT" > /tmp/impact_report.txt

      # [한글] Step 3: 추적 Issue 자동 생성
      #   "[Spec Change] {파일명}" 제목의 GitHub Issue 생성
      #   레이블: spec-change, needs-review (레이블 미존재 시 레이블 없이 생성)
      #   Issue 본문에 변경 파일 목록 + TODO 체크리스트 + 커밋 링크 포함
      # [English] Step 3: Auto-create tracking Issue
      #   Creates GitHub Issue titled "[Spec Change] {filename}"
      #   Labels: spec-change, needs-review (falls back to no labels if they don't exist)
      #   Issue body includes changed file list + TODO checklist + commit link
      - name: Create tracking issue
        if: steps.detect.outputs.has_changes == 'true'
        env:
          CHANGED_LIST: ${{ steps.detect.outputs.changed_list }}
        run: |
          IFS=',' read -ra FILES <<< "$CHANGED_LIST"
          FILENAMES=$(for f in "${FILES[@]}"; do basename "$f"; done | paste -sd ', ')
          TITLE="[Spec Change] ${FILENAMES}"

          FILE_LIST=""
          for f in "${FILES[@]}"; do
            FILE_LIST+="- \`${f}\`\n"
          done

          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          BODY=$(cat <<ISSUEBODY
## Spec Change Detected

The following Spec files were updated:
$(echo -e "$FILE_LIST")

### TODO
- [ ] Review spec changes
- [ ] Update affected code
- [ ] Update tests
- [ ] Update documentation

### Related Commit
${COMMIT_URL}

*Auto-generated by GitHub Actions*
ISSUEBODY
)

          # [한글] 레이블 포함하여 Issue 생성 시도, 실패 시 레이블 없이 생성
          # [English] Try creating issue with labels, fall back to no labels on error
          HTTP_STATUS=$(curl --silent --request POST \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "Content-Type: application/json" \
            --write-out "%{http_code}" \
            --output /tmp/issue_response.json \
            --data "$(python3 -c "
import json, sys
title = sys.argv[1]
body = sys.argv[2]
print(json.dumps({'title': title, 'body': body, 'labels': ['spec-change', 'needs-review']}))
" "$TITLE" "$BODY")" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues")

          if [ "$HTTP_STATUS" != "201" ]; then
            echo "Failed with labels (HTTP ${HTTP_STATUS}), creating without labels"
            curl --silent --request POST \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "Content-Type: application/json" \
              --data "$(python3 -c "
import json, sys
title = sys.argv[1]
body = sys.argv[2]
print(json.dumps({'title': title, 'body': body}))
" "$TITLE" "$BODY")" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues"
          else
            ISSUE_URL=$(python3 -c "import json; d=json.load(open('/tmp/issue_response.json')); print(d.get('html_url',''))" 2>/dev/null || true)
            echo "Issue created: ${ISSUE_URL}"
          fi
