# =============================================================================
# Todo Tracker — Notion Tasks DB 자동 갱신 (범용)
# =============================================================================
#
# [한글]
# 기능: 브랜치 생성 시 할 일 → 진행중, PR merge 시 진행중/QA → 완료
# 트리거: branch 생성 (create) + PR merge (pull_request closed)
# 매칭: 브랜치명 키워드 → Notion Tasks DB Spec 칼럼 fuzzy match
# Notion이 유일한 Source of Truth (todo.md는 초기 등록용만)
#
# [English]
# Purpose: Auto-update Notion Tasks DB on branch/PR events
# Notion is the single source of truth for task tracking.
# todo.md is only used for initial bulk registration (register action).
#
# 배포 위치: 프로젝트의 .github/workflows/todo-tracker.yml 에 복사하여 사용
# 의존 스크립트:
#   - scripts/sync-notion-tasks.py  (Notion 갱신)
# =============================================================================

name: Todo Tracker

on:
  create:  # branch created → Doing
  pull_request:
    types: [closed]  # PR merged → Done
    branches: [develop, main]

jobs:
  mark-doing:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'create' &&
      github.ref_type == 'branch' &&
      github.ref_name != 'main' &&
      github.ref_name != 'develop' &&
      github.ref_name != 'gh-pages'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Update Notion
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$NOTION_API_TOKEN" ]; then
            echo "NOTION_API_TOKEN not set — skipping"
            exit 0
          fi
          if [ -f scripts/sync-notion-tasks.py ]; then
            python3 scripts/sync-notion-tasks.py doing "$BRANCH"
          else
            echo "sync-notion-tasks.py not found — skipping"
          fi

  mark-done:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Update Notion
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          BRANCH: ${{ github.head_ref }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$NOTION_API_TOKEN" ]; then
            echo "NOTION_API_TOKEN not set — skipping"
            exit 0
          fi
          if [ -f scripts/sync-notion-tasks.py ]; then
            python3 scripts/sync-notion-tasks.py done "$BRANCH" "$PR_NUM" "$PR_URL"
          else
            echo "sync-notion-tasks.py not found — skipping"
          fi
