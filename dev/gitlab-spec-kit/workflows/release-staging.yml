# Release + Staging
#
# 배포 위치: 프로젝트의 .gitlab-ci.yml 또는 .gitlab/ci/release-staging.yml 에 포함하여 사용

stages:
  - branch
  - staging
  - e2e
  - mr

# [한글] 수동 트리거 전용 워크플로우 — GitLab UI에서 변수를 입력하여 실행
# [English] Manual trigger only — run from GitLab UI with variables
workflow:
  rules:
    - when: manual

variables:
  # [한글] 릴리즈 버전 (예: 1.2.0) — 필수
  # [English] Release version (e.g. 1.2.0) — required
  VERSION:
    value: ""
    description: "Release version (e.g. 1.2.0)"
  # [한글] 스테이징 배포 여부 (release-config.json의 deployCommand 필요)
  # [English] Deploy to staging (requires deployCommand in release-config.json)
  DEPLOY_STAGING:
    value: "true"
    description: "Deploy to staging (requires deployCommand in release-config.json)"

# [한글] 동시 실행 방지 — 버전별 그룹
# [English] Prevent concurrent runs — group by version
resource_group: release-$VERSION

# ─────────────────────────────────────────────
# Job 1: Create Release Branch
# ─────────────────────────────────────────────
create-release-branch:
  stage: branch
  image: node:20
  tags:
    - docker
  variables:
    GIT_DEPTH: "0"
  before_script:
    - npm install -g pnpm
  script:
    - |
      if [ -z "$VERSION" ]; then
        echo "VERSION variable is required"
        exit 1
      fi

      BRANCH="release/${VERSION}"

      # [한글] git 설정
      # [English] Configure git
      git config user.name "gitlab-ci-token"
      git config user.email "gitlab-ci-token@noreply.gitlab.com"

      # [한글] develop에서 release 브랜치 생성
      # [English] Create release branch from develop
      git fetch origin develop
      git checkout -b "$BRANCH" origin/develop

      # [한글] package.json 버전 업데이트
      # [English] Bump version in package.json
      if [ -f "package.json" ]; then
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${VERSION}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('Version bumped to ${VERSION}');
        "
        git add package.json
        git commit -m "chore: bump version to ${VERSION}" || echo "No changes to commit"
      fi

      pnpm install --frozen-lockfile
      pnpm run build

      # [한글] release 브랜치 push
      # [English] Push release branch
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git push origin "$BRANCH"

      echo "RELEASE_BRANCH=${BRANCH}" >> branch.env
      echo "Release branch ${BRANCH} created and pushed"
  artifacts:
    reports:
      dotenv: branch.env
    expire_in: 1 hour

# ─────────────────────────────────────────────
# Job 2: Staging Deploy (conditional)
# ─────────────────────────────────────────────
staging-deploy:
  stage: staging
  image: node:20
  tags:
    - docker
  needs:
    - job: create-release-branch
      artifacts: true
  rules:
    - if: $DEPLOY_STAGING == "true"
      when: on_success
  variables:
    DEPLOY_ENV: staging
  before_script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
  script:
    - |
      if [ -f "release-config.json" ]; then
        DEPLOY_CMD=$(node -e "
          const c = require('./release-config.json');
          console.log(c.environments?.staging?.deployCommand || '');
        " 2>/dev/null || echo "")
      else
        DEPLOY_CMD=""
        echo "release-config.json not found — skipping deploy"
      fi

      if [ -z "$DEPLOY_CMD" ]; then
        echo "deployCommand is empty — 배포 인프라 미설정. build/test만 실행합니다."
        echo "STAGING_DEPLOYED=skipped" >> staging.env
      else
        echo "Executing: $DEPLOY_CMD"
        eval "$DEPLOY_CMD"
        echo "STAGING_DEPLOYED=true" >> staging.env
      fi
    - |
      # [한글] 헬스 체크 (staging 배포가 실행된 경우에만)
      # [English] Health check (only when staging deploy ran)
      if [ "${STAGING_DEPLOYED:-skipped}" = "true" ]; then
        HEALTH=$(node -e "
          const c = require('./release-config.json');
          console.log(c.environments?.staging?.healthEndpoint || '');
        " 2>/dev/null || echo "")
        if [ -n "$HEALTH" ]; then
          TIMEOUT=$(node -e "
            const c = require('./release-config.json');
            console.log(c.environments?.staging?.healthTimeout || 120);
          " 2>/dev/null || echo "120")
          echo "Waiting for $HEALTH (timeout: ${TIMEOUT}s)..."
          END=$((SECONDS + TIMEOUT))
          while [ $SECONDS -lt $END ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "Health check timed out"
          exit 1
        fi
      fi
  artifacts:
    reports:
      dotenv: staging.env
    expire_in: 1 hour

# ─────────────────────────────────────────────
# Job 3: E2E (staging)
# ─────────────────────────────────────────────
e2e-staging:
  stage: e2e
  image: node:20
  tags:
    - docker
  needs:
    - job: create-release-branch
      artifacts: true
    - job: staging-deploy
      artifacts: true
      optional: true
  rules:
    - when: on_success
  before_script:
    - |
      if [ ! -f ".specify/e2e-pipeline.json" ]; then
        echo "No e2e-pipeline.json — skipping E2E"
        exit 0
      fi
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
    - pnpm exec playwright install --with-deps chromium
  script:
    - |
      if [ ! -f ".specify/e2e-pipeline.json" ]; then
        echo "No e2e-pipeline.json — skipping E2E"
        exit 0
      fi
      if [ -f "scripts/e2e-runner.sh" ]; then
        bash scripts/e2e-runner.sh --env staging
      else
        echo "e2e-runner.sh not found — skipping"
      fi
  variables:
    CI: "true"

# ─────────────────────────────────────────────
# Job 4: Create Release MR
# ─────────────────────────────────────────────
create-release-mr:
  stage: mr
  image: node:20
  tags:
    - docker
  needs:
    - job: create-release-branch
      artifacts: true
    - job: staging-deploy
      artifacts: true
      optional: true
    - job: e2e-staging
      artifacts: false
      optional: true
  rules:
    - when: on_success
  script:
    - |
      BRANCH="release/${VERSION}"
      STAGING="${STAGING_DEPLOYED:-skipped}"

      # [한글] e2e-staging job 결과는 CI_JOB_STATUS 변수로 직접 접근 불가하므로 항목만 표시
      # [English] e2e-staging job result cannot be accessed directly via variable, so just list it
      BODY=$(cat <<MRBODY
## Release ${VERSION}

### Pre-merge Checklist
- [ ] Version bumped in package.json
- [$([ "$STAGING" = "true" ] && echo "x" || echo " ")] Staging deploy (${STAGING})
- [ ] E2E staging (see pipeline)
- [ ] CHANGELOG reviewed
- [ ] QA sign-off

> **Forge Phase 11** — Approve and merge to main to trigger Phase 7 production deploy.
MRBODY
)

      # [한글] GitLab Merge Request 생성
      # [English] Create GitLab Merge Request
      MR_RESPONSE=$(curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"source_branch\": \"${BRANCH}\",
          \"target_branch\": \"main\",
          \"title\": \"release: ${VERSION}\",
          \"description\": $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
          \"remove_source_branch\": false
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests")

      MR_URL=$(echo "$MR_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('web_url',''))" 2>/dev/null || true)
      echo "Release MR created: ${MR_URL}"
      echo "## Release MR"
      echo "${MR_URL}"
      echo ""
      echo "**Forge Check 9.5** — [STOP] Human 승인 필요"
