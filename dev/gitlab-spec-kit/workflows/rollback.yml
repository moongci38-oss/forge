# Rollback
#
# 배포 위치: 프로젝트의 .gitlab-ci.yml 또는 .gitlab/ci/rollback.yml 에 포함하여 사용

stages:
  - rollback
  - summary

# [한글] 수동 트리거 전용 워크플로우
# [English] Manual trigger only
workflow:
  rules:
    - when: manual

variables:
  # [한글] 롤백 이유 (간단한 설명) — 필수
  # [English] Rollback reason (brief description) — required
  REASON:
    value: ""
    description: "Rollback reason (brief description)"
  # [한글] 롤백 레벨 선택: L1-quick-revert / L2-release-revert / L3-hotfix-forward
  # [English] Rollback level: L1-quick-revert / L2-release-revert / L3-hotfix-forward
  LEVEL:
    value: "L1-quick-revert"
    description: "Rollback level: L1-quick-revert | L2-release-revert | L3-hotfix-forward"
  # [한글] L2 롤백 대상 버전 (예: 1.1.0) — L1/L3는 공란
  # [English] Target version for L2 (e.g. 1.1.0) — leave blank for L1/L3
  TARGET_VERSION:
    value: ""
    description: "Target version for L2 (e.g. 1.1.0) — leave blank for L1/L3"

# [한글] 동시 롤백 방지
# [English] Prevent concurrent rollbacks
resource_group: rollback

# ─────────────────────────────────────────────
# Job 1: L1 Quick Revert
# ─────────────────────────────────────────────
rollback-l1:
  stage: rollback
  image: node:20
  tags:
    - docker
  rules:
    - if: $LEVEL == "L1-quick-revert"
      when: on_success
  variables:
    GIT_DEPTH: "2"
  script:
    - |
      git config user.name "gitlab-ci-token"
      git config user.email "gitlab-ci-token@noreply.gitlab.com"
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      git fetch origin main
      git checkout main

      COMMIT=$(git rev-parse HEAD)
      git revert --no-edit "$COMMIT"
      git push origin main

      echo "## L1 Quick Revert Complete"
      echo "Reverted commit: $COMMIT"
      echo "Reason: ${REASON}"

# ─────────────────────────────────────────────
# Job 2: L2 Release Revert
# ─────────────────────────────────────────────
rollback-l2:
  stage: rollback
  image: node:20
  tags:
    - docker
  rules:
    - if: $LEVEL == "L2-release-revert"
      when: on_success
  variables:
    GIT_DEPTH: "0"
    DEPLOY_ENV: production
  script:
    - |
      git config user.name "gitlab-ci-token"
      git config user.email "gitlab-ci-token@noreply.gitlab.com"
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      if [ -z "$TARGET_VERSION" ]; then
        echo "TARGET_VERSION is required for L2 rollback"
        exit 1
      fi

      TAG="v${TARGET_VERSION}"
      git fetch --tags origin

      if ! git tag | grep -q "^${TAG}$"; then
        echo "Tag $TAG not found. Available tags:"
        git tag | sort -V | tail -20
        exit 1
      fi
      echo "Target tag $TAG found"

      git fetch origin main
      git checkout main

      TARGET_SHA=$(git rev-parse "$TAG")
      CURRENT_SHA=$(git rev-parse HEAD)

      # [한글] 대상 태그까지 revert
      # [English] Revert commits back to target tag
      git revert --no-commit "$TARGET_SHA...$CURRENT_SHA"
      git commit -m "revert: rollback to $TAG (L2 rollback — ${REASON})"
      git push origin main

      echo "## L2 Release Revert Complete"
      echo "Reverted to: $TAG ($TARGET_SHA)"
      echo "Reason: ${REASON}"
    - |
      # [한글] 이전 버전 재배포 (deployCommand 설정된 경우)
      # [English] Re-deploy previous version (if deployCommand configured)
      if [ ! -f "release-config.json" ]; then
        echo "No release-config.json — skipping re-deploy"
        exit 0
      fi
      DEPLOY_CMD=$(node -e "
        try {
          const c = require('./release-config.json');
          process.stdout.write(c.environments?.production?.deployCommand || '');
        } catch(e) {
          process.stdout.write('');
        }
      " 2>/dev/null || echo "")
      if [ -n "$DEPLOY_CMD" ]; then
        echo "Re-deploying previous version..."
        eval "$DEPLOY_CMD"
      else
        echo "deployCommand empty — code reverted but no re-deploy triggered"
      fi

# ─────────────────────────────────────────────
# Job 3: L3 Hotfix Forward
# ─────────────────────────────────────────────
rollback-l3:
  stage: rollback
  image: node:20
  tags:
    - docker
  rules:
    - if: $LEVEL == "L3-hotfix-forward"
      when: on_success
  variables:
    GIT_DEPTH: "0"
  script:
    - |
      git config user.name "gitlab-ci-token"
      git config user.email "gitlab-ci-token@noreply.gitlab.com"
      git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      git fetch origin main
      git checkout main

      VERSION=$(node -e "
        try {
          const p = require('./package.json');
          process.stdout.write(p.version || '0.0.0');
        } catch(e) {
          process.stdout.write('0.0.0');
        }
      " 2>/dev/null || echo "0.0.0")

      TIMESTAMP=$(date +%Y%m%d-%H%M)
      BRANCH="hotfix/rollback-${TIMESTAMP}"
      git checkout -b "$BRANCH"
      git push origin "$BRANCH"

      echo "## L3 Hotfix Forward — Branch Created"
      echo ""
      echo "**Hotfix branch**: \`$BRANCH\`"
      echo "**Reason**: ${REASON}"
      echo ""
      echo "### Next Steps"
      echo "1. Checkout \`$BRANCH\`"
      echo "2. Apply fix"
      echo "3. Run Forge Hotfix 플로우 (Phase 3 → Check 3 → Phase 4 PR → Phase 7)"

# ─────────────────────────────────────────────
# Job 4: Rollback Summary
# ─────────────────────────────────────────────
rollback-summary:
  stage: summary
  image: node:20
  tags:
    - docker
  needs:
    - job: rollback-l1
      optional: true
      artifacts: false
    - job: rollback-l2
      optional: true
      artifacts: false
    - job: rollback-l3
      optional: true
      artifacts: false
  rules:
    - when: always
  script:
    - |
      echo "## Forge Rollback Summary"
      echo ""
      echo "| Item | Value |"
      echo "|------|-------|"
      echo "| Level | ${LEVEL} |"
      echo "| Reason | ${REASON} |"
      echo "| Target Version | ${TARGET_VERSION:-N/A} |"
      echo ""
      echo "See individual job logs for detailed results."
