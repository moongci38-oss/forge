# Develop Integration Check
#
# 배포 위치: 프로젝트의 .gitlab-ci.yml 또는 .gitlab/ci/develop-integration.yml 에 포함하여 사용

stages:
  - verify
  - e2e
  - report

variables:
  # GitLab CI 기본 변수 사용 — 추가 설정 없음
  GIT_DEPTH: "0"

# [한글] develop 브랜치에 push될 때만 실행
# [English] Only runs on push to develop branch
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# [한글] 동시 실행 방지 — develop 브랜치 기준 그룹
# [English] Prevent concurrent runs — group by develop branch
resource_group: develop-integration-$CI_COMMIT_BRANCH

# ─────────────────────────────────────────────
# Job 1: Integration Verify
# ─────────────────────────────────────────────
integration-verify:
  stage: verify
  image: node:20
  tags:
    - docker
  before_script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
  script:
    - |
      if [ -f "scripts/verify.sh" ]; then
        bash scripts/verify.sh code
        echo "VERIFY_RESULT=pass" >> verify.env
      else
        echo "verify.sh not found — running fallback checks"
        pnpm run build 2>&1 || exit 1
        pnpm run lint 2>&1 || true
        pnpm run test 2>&1 || exit 1
        echo "VERIFY_RESULT=pass" >> verify.env
      fi
  artifacts:
    reports:
      dotenv: verify.env
    expire_in: 1 hour

# ─────────────────────────────────────────────
# Job 2: E2E Check (conditional)
# ─────────────────────────────────────────────
e2e-check:
  stage: e2e
  image: node:20
  tags:
    - docker
  needs:
    - job: integration-verify
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: on_success
  before_script:
    - |
      if [ ! -f ".specify/e2e-pipeline.json" ]; then
        echo "No e2e-pipeline.json found — skipping E2E"
        exit 0
      fi
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
    - pnpm exec playwright install --with-deps chromium
  script:
    - |
      if [ ! -f ".specify/e2e-pipeline.json" ]; then
        echo "No e2e-pipeline.json — skipping E2E"
        exit 0
      fi
      if [ -f "scripts/e2e-runner.sh" ]; then
        bash scripts/e2e-runner.sh --env local
      else
        echo "e2e-runner.sh not found — skipping E2E runner"
      fi
  variables:
    CI: "true"

# ─────────────────────────────────────────────
# Job 3: Integration Report
# ─────────────────────────────────────────────
integration-report:
  stage: report
  image: node:20
  tags:
    - docker
  needs:
    - job: integration-verify
      artifacts: true
    - job: e2e-check
      artifacts: false
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: always
  script:
    - |
      SHORT_SHA="${CI_COMMIT_SHA:0:7}"
      echo "## Forge Phase 5 — Develop Integration"
      echo ""
      echo "| Check | Result |"
      echo "|-------|--------|"
      echo "| verify.sh code | ${VERIFY_RESULT:-unknown} |"
      echo "| E2E (local) | (see e2e-check job) |"
      echo ""
      echo "Overall (commit: ${SHORT_SHA})"

      # [한글] 실패 시 GitLab Issues API로 이슈 생성
      # [English] On failure, create issue via GitLab Issues API
      if [ "${VERIFY_RESULT:-unknown}" != "pass" ]; then
        COMMIT="${CI_COMMIT_SHA}"
        SHORT="${COMMIT:0:7}"

        # [한글] 동일 커밋 이슈 중복 생성 방지 — 기존 이슈 목록 조회
        # [English] Avoid duplicate issues for the same commit — check existing issues
        EXISTING=$(curl --silent \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues?labels=integration-failure&state=opened" \
          | grep -o "\"title\":\"[^\"]*${SHORT}[^\"]*\"" || true)

        if [ -z "$EXISTING" ]; then
          BODY=$(cat <<ISSUEBODY
## Develop Integration Check Failed

**Branch:** develop
**Commit:** ${CI_COMMIT_SHA}
**Pipeline:** ${CI_PROJECT_URL}/-/pipelines/${CI_PIPELINE_ID}

### Failed Jobs
- verify.sh code: ${VERIFY_RESULT:-unknown}

**Forge Phase 5** — Please investigate and fix before cutting a release branch.
ISSUEBODY
)
          curl --silent --request POST \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"title\": \"[Integration Failure] develop @ ${SHORT}\",
              \"description\": $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"labels\": \"integration-failure,forge-phase-5\"
            }" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/issues"
          echo "Issue created for commit ${SHORT}"
        else
          echo "Issue already exists for commit ${SHORT} — skipping"
        fi
      fi
