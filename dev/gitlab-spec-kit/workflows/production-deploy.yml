# Production Deploy
#
# 배포 위치: 프로젝트의 .gitlab-ci.yml 또는 .gitlab/ci/production-deploy.yml 에 포함하여 사용

stages:
  - deploy
  - health
  - smoke
  - release
  - cleanup

# [한글] 동시 실행 방지 — 프로덕션 배포는 직렬 실행
# [English] Prevent concurrent runs — production deploys are serial
resource_group: production-deploy

# ─────────────────────────────────────────────
# Job 1: Deploy to Production
# ─────────────────────────────────────────────
deploy:
  stage: deploy
  image: node:20
  tags:
    - docker
  rules:
    # [한글] main 브랜치 push 시 자동 실행
    # [English] Auto-run on push to main branch
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    # [한글] 수동 트리거 (skip_deploy 변수로 build artifacts만 생성 가능)
    # [English] Manual trigger (set SKIP_DEPLOY=true to build artifacts only)
    - when: manual
      allow_failure: false
  variables:
    SKIP_DEPLOY: "false"
    DEPLOY_ENV: production
  before_script:
    - npm install -g pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - |
      VERSION=$(node -e "
        try {
          const p = require('./package.json');
          process.stdout.write(p.version || '0.0.0');
        } catch(e) {
          process.stdout.write('0.0.0');
        }
      " 2>/dev/null || echo "0.0.0")
      echo "VERSION=${VERSION}" >> deploy.env
    - |
      if [ -f "release-config.json" ]; then
        DEPLOY_CMD=$(node -e "
          try {
            const c = require('./release-config.json');
            process.stdout.write(c.environments?.production?.deployCommand || '');
          } catch(e) {
            process.stdout.write('');
          }
        " 2>/dev/null || echo "")
      else
        DEPLOY_CMD=""
      fi

      if [ "${SKIP_DEPLOY}" = "true" ]; then
        echo "SKIP_DEPLOY=true — build artifacts만 생성합니다."
        echo "DEPLOYED=skipped" >> deploy.env
      elif [ -z "$DEPLOY_CMD" ]; then
        echo "deployCommand is empty — 배포 인프라 미설정. build artifacts만 생성합니다."
        echo "DEPLOYED=skipped" >> deploy.env
      else
        echo "Executing: $DEPLOY_CMD"
        eval "$DEPLOY_CMD"
        echo "DEPLOYED=true" >> deploy.env
      fi
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 1 hour

# ─────────────────────────────────────────────
# Job 2: Health Check
# ─────────────────────────────────────────────
health-check:
  stage: health
  image: node:20
  tags:
    - docker
  needs:
    - job: deploy
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  script:
    - |
      if [ "${DEPLOYED}" != "true" ]; then
        echo "Deploy was skipped — skipping health check"
        exit 0
      fi
      if [ ! -f "release-config.json" ]; then
        echo "No release-config.json — skipping health check"
        exit 0
      fi
      HEALTH=$(node -e "
        try {
          const c = require('./release-config.json');
          process.stdout.write(c.environments?.production?.healthEndpoint || '');
        } catch(e) {
          process.stdout.write('');
        }
      " 2>/dev/null || echo "")
      if [ -z "$HEALTH" ]; then
        echo "No healthEndpoint configured — skipping health check"
        exit 0
      fi
      TIMEOUT=$(node -e "
        try {
          const c = require('./release-config.json');
          process.stdout.write(String(c.environments?.production?.healthTimeout || 120));
        } catch(e) {
          process.stdout.write('120');
        }
      " 2>/dev/null || echo "120")
      echo "Checking $HEALTH (timeout: ${TIMEOUT}s)..."
      END=$((SECONDS + TIMEOUT))
      while [ $SECONDS -lt $END ]; do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH" 2>/dev/null || echo "000")
        if [ "$STATUS" = "200" ]; then
          echo "Health check passed (HTTP 200)"
          exit 0
        fi
        echo "Returned $STATUS — retrying in 5s..."
        sleep 5
      done
      echo "Health check timed out"
      exit 1

# ─────────────────────────────────────────────
# Job 3: Smoke Test
# ─────────────────────────────────────────────
smoke-test:
  stage: smoke
  image: node:20
  tags:
    - docker
  needs:
    - job: deploy
      artifacts: true
    - job: health-check
      artifacts: false
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  script:
    - |
      if [ ! -f "release-config.json" ]; then
        echo "No release-config.json — skipping smoke test"
        exit 0
      fi
      SMOKE=$(node -e "
        try {
          const c = require('./release-config.json');
          process.stdout.write(c.environments?.production?.smokeTestURL || '');
        } catch(e) {
          process.stdout.write('');
        }
      " 2>/dev/null || echo "")
      if [ -z "$SMOKE" ]; then
        echo "No smokeTestURL configured — skipping smoke test"
        exit 0
      fi
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SMOKE" 2>/dev/null || echo "000")
      if [ "$STATUS" = "200" ]; then
        echo "Smoke test passed: $SMOKE → HTTP $STATUS"
      else
        echo "Smoke test failed: $SMOKE → HTTP $STATUS"
        exit 1
      fi

# ─────────────────────────────────────────────
# Job 4: Create GitLab Release
# ─────────────────────────────────────────────
create-release:
  stage: release
  image: node:20
  tags:
    - docker
  needs:
    - job: deploy
      artifacts: true
    - job: health-check
      artifacts: false
      optional: true
    - job: smoke-test
      artifacts: false
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  script:
    - |
      VERSION="${VERSION:-0.0.0}"
      TAG="v${VERSION}"
      SHA="${CI_COMMIT_SHA}"

      # [한글] 태그 생성 (이미 존재하면 스킵)
      # [English] Create tag (skip if already exists)
      TAG_EXISTS=$(curl --silent \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/${TAG}" \
        | grep -o '"name"' || true)

      if [ -z "$TAG_EXISTS" ]; then
        curl --silent --request POST \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"tag_name\": \"${TAG}\", \"ref\": \"${SHA}\"}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags"
        echo "Tag ${TAG} created"
      else
        echo "Tag ${TAG} already exists — skipping"
      fi

      # [한글] CHANGELOG 읽기 (존재하면)
      # [English] Read CHANGELOG if exists
      if [ -f "CHANGELOG.md" ]; then
        BODY=$(head -30 CHANGELOG.md)
      else
        BODY="## Release ${VERSION}\n\nDeployed via Forge Phase 7."
      fi

      # [한글] GitLab Release 생성
      # [English] Create GitLab Release
      RELEASE_RESPONSE=$(curl --silent --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"Release ${VERSION}\",
          \"tag_name\": \"${TAG}\",
          \"description\": $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
          \"released_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      echo "Release response: $RELEASE_RESPONSE"
      echo "Forge Phase 7 Complete — Release ${VERSION} created"

# ─────────────────────────────────────────────
# Job 5: Cleanup Release Branch
# ─────────────────────────────────────────────
cleanup:
  stage: cleanup
  image: node:20
  tags:
    - docker
  needs:
    - job: deploy
      artifacts: true
    - job: create-release
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  script:
    - |
      VERSION="${VERSION:-0.0.0}"
      BRANCH="release%2F${VERSION}"

      # [한글] release/{version} 브랜치 삭제
      # [English] Delete release/{version} branch
      HTTP_STATUS=$(curl --silent --request DELETE \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --write-out "%{http_code}" \
        --output /dev/null \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/branches/${BRANCH}")

      if [ "$HTTP_STATUS" = "204" ]; then
        echo "Branch release/${VERSION} deleted"
      elif [ "$HTTP_STATUS" = "404" ]; then
        echo "Branch release/${VERSION} not found — skipping"
      else
        echo "Could not delete branch release/${VERSION} (HTTP ${HTTP_STATUS}) — skipping"
      fi
