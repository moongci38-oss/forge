name: Weekly Research Report

on:
  schedule:
    # 매주 월요일 00:00 UTC (한국시간 09:00)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: scripts/weekly-report
        run: npm ci

      - name: Generate weekly report
        working-directory: scripts/weekly-report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.mjs

      - name: Upload to Notion
        working-directory: scripts/weekly-report
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node upload-notion.mjs

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 01-research/weekly/
          if git diff --staged --quiet; then
            echo "No new report to commit"
          else
            WEEK=$(date -u +%Y-W%V)
            git commit -m "docs: ${WEEK} 주간 리서치 리포트 자동 생성"
            git push
          fi
