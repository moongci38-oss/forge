# Forge CI/CD Pipeline

stages:
  - evals
  - auto-merge
  - weekly-report

# Evals 구조 검증 (항상 실행 — 빠름, API 없음)
evals:structure:
  stage: evals
  image: python:3.11-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - pip install --quiet anthropic 2>/dev/null || true
    - python3 shared/scripts/validate-evals.py structure
  artifacts:
    when: on_failure
    paths:
      - .claude/security.log
    expire_in: 7 days

# Evals LLM Judge (수동/스케줄만 실행 — Haiku API 사용)
evals:llm-judge:
  stage: evals
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - pip install --quiet anthropic
    - python3 shared/scripts/validate-evals.py llm-judge --max 20
  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
  artifacts:
    when: always
    paths:
      - .claude/security.log
    expire_in: 30 days

# Auto Merge (develop → staging → main)
auto-merge:staging:
  stage: auto-merge
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  script:
    - git config user.name "gitlab-ci-token"
    - git config user.email "gitlab-ci-token@gitlab"
    - git checkout staging
    - git merge origin/develop --no-edit
    - git push origin staging

auto-merge:main:
  stage: auto-merge
  needs: ["auto-merge:staging"]
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  script:
    - git config user.name "gitlab-ci-token"
    - git config user.email "gitlab-ci-token@gitlab"
    - git fetch origin staging
    - git checkout main
    - git merge origin/staging --no-edit
    - git push origin main

# Weekly Research Report
weekly-report:
  stage: weekly-report
  image: node:22
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  script:
    - cd scripts/weekly-report
    - npm ci
    - node generate.mjs
    - node upload-notion.mjs
    - cd ../..
    - git config user.name "gitlab-ci-token"
    - git config user.email "gitlab-ci-token@gitlab"
    - git add 01-research/weekly/
    - |
      if git diff --staged --quiet; then
        echo "No new report to commit"
      else
        WEEK=$(date -u +%Y-W%V)
        git commit -m "docs: ${WEEK} 주간 리서치 리포트 자동 생성"
        git push
      fi
  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
    NOTION_API_KEY: $NOTION_API_KEY
    NOTION_PAGE_ID: $NOTION_PAGE_ID
    NOTION_DATABASE_ID: $NOTION_DATABASE_ID
