<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonial Carousel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    @property --ring-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #08080F;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --text:    #EDEDF5;
      --muted:   rgba(237,237,245,0.42);
      --p:   #8B5CF6;
      --b:   #3B82F6;
      --pk:  #EC4899;
      --gold: #F4A723;
      --r:   22px;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 55% at 50% -5%, rgba(139,92,246,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 95% 105%, rgba(59,130,246,0.09) 0%, transparent 50%);
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .wrap { width: 100%; max-width: 900px; }

    /* ── Eyebrow ── */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .eyebrow-line {
      height: 1px; width: 44px; flex-shrink: 0;
      background: linear-gradient(90deg, var(--p), var(--b));
    }
    .eyebrow-text {
      font-size: 0.67rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── CSS Grid slide stack ── */
    .stage { display: grid; }

    .slide {
      grid-area: 1 / 1;
      opacity: 0;
      transform: translateY(18px) scale(0.997);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    /* ── Card ── */
    .card {
      position: relative;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(24px);
      padding: 3.25rem 3.5rem 3rem;
      overflow: hidden;
      transition: border-color 0.35s ease;
    }
    .card:hover { border-color: rgba(139,92,246,0.28); }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 300px; height: 200px;
      background: radial-gradient(ellipse at 0% 0%, rgba(139,92,246,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 240px; height: 160px;
      background: radial-gradient(ellipse at 100% 100%, rgba(59,130,246,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Decorative giant quote ── */
    .deco {
      position: absolute;
      top: -3rem; left: 1.5rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: min(24vw, 20rem);
      line-height: 1;
      font-style: italic;
      font-weight: 300;
      color: rgba(139,92,246,0.055);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* ── Body grid ── */
    .body {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 2.75rem;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* ── Quote side ── */
    .qside { display: flex; flex-direction: column; gap: 1.75rem; }

    .stars { display: flex; gap: 0.2rem; }
    .star {
      color: var(--gold);
      font-size: 0.88rem;
      filter: drop-shadow(0 0 6px rgba(244,167,35,0.55));
    }

    .quote {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.1rem, 2.4vw, 1.45rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.8;
      color: var(--text);
    }
    .qm {
      font-style: normal;
      font-size: 2.2em;
      line-height: 0;
      vertical-align: -0.35em;
      background: linear-gradient(135deg, var(--p), var(--b));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Author side ── */
    .aside {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      text-align: center;
    }

    /* Spinning conic-gradient ring via 2-div method */
    .photo-outer {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: conic-gradient(
        from var(--ring-angle),
        var(--p), var(--b), var(--pk), var(--p)
      );
      padding: 3px;
      animation: ring-conic 5s linear infinite;
      flex-shrink: 0;
    }
    @keyframes ring-conic { to { --ring-angle: 360deg; } }

    /* Fallback for browsers without @property */
    @supports not (background: conic-gradient(from 1deg, red, blue)) {
      .photo-outer {
        background: linear-gradient(135deg, var(--p), var(--b), var(--pk));
        animation: ring-rotate 5s linear infinite;
      }
      @keyframes ring-rotate { to { transform: rotate(360deg); } }
      .photo-inner { animation: ring-rotate-rev 5s linear infinite; }
      @keyframes ring-rotate-rev { to { transform: rotate(-360deg); } }
    }

    .photo-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--bg);
      padding: 3px;
    }

    .photo-inner img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .aname { font-size: 0.92rem; font-weight: 500; color: var(--text); }
    .arole { font-size: 0.76rem; font-weight: 300; color: var(--muted); margin-top: -0.15rem; }
    .acomp {
      font-size: 0.72rem; font-weight: 500;
      background: linear-gradient(90deg, var(--p), var(--b));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Progress bar ── */
    .prog-track {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.05);
      border-radius: 0 0 var(--r) var(--r);
      overflow: hidden;
      z-index: 2;
    }
    .prog-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--p), var(--b), var(--pk));
      transition: width 0.08s linear;
    }

    /* ── Navigation ── */
    .nav {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 1.75rem;
    }

    .dots { display: flex; gap: 0.5rem; align-items: center; }
    .dot {
      height: 6px; width: 6px; border-radius: 3px;
      background: var(--border);
      border: none; cursor: pointer; padding: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dot.active { width: 28px; background: linear-gradient(90deg, var(--p), var(--b)); }
    .dot:hover:not(.active) { background: rgba(139,92,246,0.38); }

    .arrows { display: flex; gap: 0.65rem; }
    .arr {
      width: 46px; height: 46px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .arr:hover { border-color: rgba(139,92,246,0.5); background: rgba(139,92,246,0.12); }
    .arr:active { transform: scale(0.93); }
    .arr svg { pointer-events: none; flex-shrink: 0; }

    /* ── Responsive ── */
    @media (max-width: 620px) {
      .card { padding: 2rem 1.75rem 2rem; }
      .body { grid-template-columns: 1fr; gap: 1.75rem; }
      .aside { flex-direction: row; text-align: left; justify-content: flex-start; gap: 1.25rem; }
      .deco { font-size: 38vw; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">
    <div class="eyebrow-line"></div>
    <span class="eyebrow-text">What our customers say</span>
  </div>
  <div class="stage" id="stage"></div>
  <div class="nav">
    <div class="dots" id="dots"></div>
    <div class="arrows">
      <button class="arr" id="prev" aria-label="Previous testimonial">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="arr" id="next" aria-label="Next testimonial">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// All testimonial data is static/hardcoded — no user input involved
const ITEMS = [
  { quote: "Working with this team transformed how we think about product development. The attention to detail and creative approach exceeded every expectation we had.", name: "Sarah Chen",    role: "Chief Product Officer", company: "Luminary Tech",   stars: 5, photo: "https://i.pravatar.cc/200?img=5"  },
  { quote: "Remarkable results from day one. Our conversion rates doubled within the first month, and the experience has never felt more intuitive or genuinely delightful.", name: "Marcus Rivera",  role: "Head of Growth",        company: "Horizon Labs",    stars: 5, photo: "https://i.pravatar.cc/200?img=15" },
  { quote: "I've worked with many agencies, but this partnership stands apart. They don't just deliver — they understand vision and translate it into something extraordinary.", name: "Yuki Tanaka",   role: "Founder & CEO",         company: "Solstice Studio", stars: 5, photo: "https://i.pravatar.cc/200?img=47" },
  { quote: "The velocity of execution combined with thoughtful design was exactly what we needed. From kickoff to launch in six weeks — and it looked absolutely beautiful.", name: "Elena Vasquez", role: "VP of Engineering",      company: "NovaBridge",      stars: 5, photo: "https://i.pravatar.cc/200?img=25" },
  { quote: "Choosing this team was the best strategic decision we made last year. Our customers notice the difference, and so do our metrics — improving month over month.", name: "Oliver Wright", role: "Director of Digital",    company: "Meridian Group",  stars: 5, photo: "https://i.pravatar.cc/200?img=12" }
];

const DURATION = 5500;
const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
let cur = 0, paused = false, autoTimer, progTimer;

function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function txt(str) { return document.createTextNode(str); }

function buildSlide(t, i) {
  const slide = el('div', 'slide' + (i === 0 ? ' active' : ''));

  const card = el('div', 'card');

  // Decorative quote mark
  const deco = el('div', 'deco');
  deco.textContent = '\u201C';

  // Body grid
  const body = el('div', 'body');

  // --- Quote side ---
  const qside = el('div', 'qside');

  const stars = el('div', 'stars');
  for (let s = 0; s < t.stars; s++) {
    const star = el('span', 'star');
    star.textContent = '\u2605';
    stars.appendChild(star);
  }

  const quote = el('p', 'quote');
  const qm = el('span', 'qm');
  qm.textContent = '\u201C';
  quote.appendChild(qm);
  quote.appendChild(txt(t.quote + '\u201D'));

  qside.appendChild(stars);
  qside.appendChild(quote);

  // --- Author side ---
  const aside = el('div', 'aside');

  const photoOuter = el('div', 'photo-outer');
  const photoInner = el('div', 'photo-inner');
  const img = el('img');
  img.src = t.photo;
  img.alt = t.name;
  img.loading = 'lazy';
  photoInner.appendChild(img);
  photoOuter.appendChild(photoInner);

  const info = el('div');
  const aname = el('div', 'aname'); aname.textContent = t.name;
  const arole = el('div', 'arole'); arole.textContent = t.role;
  const acomp = el('div', 'acomp'); acomp.textContent = t.company;
  info.appendChild(aname);
  info.appendChild(arole);
  info.appendChild(acomp);

  aside.appendChild(photoOuter);
  aside.appendChild(info);

  body.appendChild(qside);
  body.appendChild(aside);

  // Progress bar
  const progTrack = el('div', 'prog-track');
  const progFill  = el('div', 'prog-fill');
  progFill.id = 'pf' + i;
  progTrack.appendChild(progFill);

  card.appendChild(deco);
  card.appendChild(body);
  card.appendChild(progTrack);
  slide.appendChild(card);
  return slide;
}

function buildDot(i) {
  const dot = el('button', 'dot' + (i === 0 ? ' active' : ''));
  dot.setAttribute('aria-label', 'Testimonial ' + (i + 1));
  dot.addEventListener('click', () => go(i));
  return dot;
}

ITEMS.forEach((t, i) => {
  stage.appendChild(buildSlide(t, i));
  dotsEl.appendChild(buildDot(i));
});

// ── Carousel logic ──
const slides  = () => stage.querySelectorAll('.slide');
const dotBtns = () => dotsEl.querySelectorAll('.dot');
const fill    = idx => document.getElementById('pf' + idx);

function go(idx) {
  const f = fill(cur);
  if (f) f.style.width = '0%';

  slides()[cur].classList.remove('active');
  dotBtns()[cur].classList.remove('active');

  cur = ((idx % ITEMS.length) + ITEMS.length) % ITEMS.length;

  slides()[cur].classList.add('active');
  dotBtns()[cur].classList.add('active');

  clearTimeout(autoTimer);
  clearInterval(progTimer);
  if (!paused) startAuto();
}

function startAuto() {
  clearTimeout(autoTimer);
  clearInterval(progTimer);

  let p = 0;
  const f = fill(cur);
  if (f) f.style.width = '0%';

  const step = 100 / (DURATION / 50);
  progTimer = setInterval(() => {
    p = Math.min(p + step, 100);
    if (f) f.style.width = p + '%';
  }, 50);

  autoTimer = setTimeout(() => go(cur + 1), DURATION);
}

document.getElementById('prev').addEventListener('click', () => go(cur - 1));
document.getElementById('next').addEventListener('click', () => go(cur + 1));

const wrap = document.querySelector('.wrap');
wrap.addEventListener('mouseenter', () => { paused = true; clearTimeout(autoTimer); clearInterval(progTimer); });
wrap.addEventListener('mouseleave', () => { paused = false; startAuto(); });

let touchX = 0;
stage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend',   e => {
  const d = touchX - e.changedTouches[0].clientX;
  if (Math.abs(d) > 44) go(cur + (d > 0 ? 1 : -1));
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(cur - 1);
  if (e.key === 'ArrowRight') go(cur + 1);
});

startAuto();
</script>

</body>
</html>
